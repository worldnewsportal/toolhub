name: toolhub
description: ToolHub - All Tools in One App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  google_fonts: ^6.2.1
  curved_navigation_bar: ^1.0.3
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0

  # Tools
  math_expressions: ^2.4.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  battery_plus: ^6.0.3
  device_info_plus: ^10.1.2
  network_info_plus: ^5.0.3
  wifi_scan: ^0.4.1
  file_picker: ^8.0.7
  open_file: ^3.3.2
  just_audio: ^0.9.40
  audio_session: ^0.1.21
  on_audio_query: ^2.9.0
  image_picker: ^1.1.2
  pdf: ^3.11.1
  printing: ^5.13.2
  sensors_plus: ^4.0.2
  flutter_compass: ^0.8.0
  wakelock_plus: ^1.2.5
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  intl: ^0.19.0

  # Ads
  unity_ads_plugin: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
